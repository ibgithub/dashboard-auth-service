server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ml_dashboard
    username: ml_user
    password: ml_user
jwt:
  secret: my-super-secret-key-minimum-32-bytes!!!
  expiration: 3600000 # 1 jam
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173